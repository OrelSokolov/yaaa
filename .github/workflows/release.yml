name: Release Build

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: '*.deb'
            artifact_path: target/debian
          - os: macos-latest
            artifact_name: '*.dmg'
            artifact_path: target/release
          - os: windows-latest
            artifact_name: '*.msi'
            artifact_path: target/wix

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone egui_term fork
        run: git clone https://github.com/OrelSokolov/egui_term.git ../egui_term

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cargo-deb

      - name: Install cargo-wix (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo install cargo-wix

      - name: Build Release
        run: cargo build --release --locked

      - name: Build Debian Package
        if: matrix.os == 'ubuntu-latest'
        run: cargo deb

      - name: Build macOS DMG
        if: matrix.os == 'macos-latest'
        run: rake build:dmg

      - name: Build Windows MSI
        if: matrix.os == 'windows-latest'
        run: rake build:msi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifact
          path: ${{ matrix.artifact_path }}/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List Artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
